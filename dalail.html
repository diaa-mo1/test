<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>دلائل الخيرات — الطريقة البيومية الأحمدية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Noto+Serif:wght@400;700&family=Source+Serif+4:ital,wght@0,400;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = window.tailwind.config || {};
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/al-bayoumiyya/components/layout.css">
  </head>
  <body class="dark bg-background custom-scrollbar" data-page="dalail">
    <div id="sidebar-container"></div>
    <main class="content-offset min-h-screen px-4 py-6 md:px-8 lg:px-12">
      <section class="max-w-6xl mx-auto">
        <div class="mb-8 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
          <div>
            <p class="text-sm uppercase tracking-[0.25em] text-secondary/70">القراءة</p>
            <h1 class="mt-3 text-4xl font-semibold">دلائل الخيرات</h1>
            <p class="mt-3 max-w-2xl text-on-surface-variant leading-7">نسخة تفاعلية من الكتاب مع أدوات تكبير وحفظ القراءة الصوتية.</p>
          </div>
          <div class="flex flex-wrap gap-3">
            <button id="text_decrease" class="topnav-button">A-</button>
            <button id="text_increase" class="topnav-button">A+</button>
            <button id="dalail-listen-btn" class="topnav-button">استمع</button>
          </div>
        </div>

        <div class="grid gap-6 lg:grid-cols-[320px_minmax(0,1fr)]">
          <aside class="glass-panel rounded-[2rem] border border-white/10 p-6">
            <div class="space-y-5">
              <div>
                <label class="text-sm font-semibold text-on-surface-variant">اختر الحزب</label>
                <select id="dalail-hizb-dropdown" class="mt-3 w-full rounded-full border border-outline bg-background px-4 py-3 text-right text-on-surface"></select>
              </div>
              <div class="grid gap-3">
                <button id="dalail-prev-btn" class="topnav-button w-full">السابق</button>
                <button id="dalail-next-btn" class="topnav-button w-full">التالي</button>
              </div>
              <div class="rounded-[1.5rem] border border-outline p-4 text-sm text-on-surface-variant">يتم حفظ اختيارك وحجم النص تلقائياً في جلسة القراءة.</div>
            </div>
          </aside>

          <section class="space-y-6">
            <article class="glass-panel rounded-[2rem] border border-white/10 p-8" id="dalail-reader">
              <div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                <div>
                  <h2 id="dalail-hizb-title" class="text-2xl font-semibold">عنوان الحزب</h2>
                  <p class="mt-3 text-on-surface-variant leading-7">اقرأ نص الحزب مع تنسيق خط واضح وسهل.</p>
                </div>
                <div class="text-sm text-secondary">حفظ تلقائي للموقع</div>
              </div>
              <div id="dalail-hizb-text" class="prose prose-rose max-w-none text-right leading-8"></div>
            </article>

            <div id="dalail-chapters-grid" class="grid gap-4 sm:grid-cols-2"></div>
          </section>
        </div>
      </section>
    </main>
    <div id="mobile-nav-container"></div>
    <div id="footer-container"></div>
    <script src="/al-bayoumiyya/components/layout.js"></script>
    <script src="/al-bayoumiyya/components/dalail.js"></script>
  </body>
</html>
